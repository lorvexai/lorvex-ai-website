<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI architecture infographic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A43B6"/><stop offset="100%" stop-color="#0A2E89"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D2F1FF"/></marker>
    <style>.title{font:700 92px 'Segoe UI';fill:#D9F2FF}.sub{font:500 26px 'Segoe UI';fill:#CBE7FF}.lbl{font:700 46px 'Segoe UI';fill:#F1FAFF}.flow{font:600 20px 'Segoe UI';fill:#D4EBFF}</style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text class="title" x="350" y="130">AGENTIC AI</text>
  <text class="sub" x="370" y="168">From goals to reliable outcomes through controlled autonomy</text>

  <rect x="90" y="220" width="1220" height="620" rx="40" fill="#0B2B89" stroke="#5FB8FF" stroke-width="18" stroke-dasharray="8 14"/>

  <circle cx="300" cy="440" r="100" fill="#041A62" stroke="#8ED8FF" stroke-width="4"/>
