  <circle cx="700" cy="440" r="100" fill="#041A62" stroke="#8ED8FF" stroke-width="4"/>
  <rect x="662" y="402" width="76" height="76" rx="12" fill="none" stroke="#F3FAFF" stroke-width="4"/>
  <text x="690" y="452" font-size="40" font-family="Segoe UI" fill="#F3FAFF">AI</text>
  <text class="lbl" x="602" y="595">Orchestrator</text>

  <circle cx="1100" cy="440" r="100" fill="#041A62" stroke="#8ED8FF" stroke-width="4"/>
  <path d="M1068 420 h64 v18 h-64 z M1068 450 h64 v18 h-64 z" fill="#F3FAFF"/>
