  <path d="M670 706 q30-36 60 0" stroke="#F3FAFF" stroke-width="4" fill="none"/>
  <circle cx="700" cy="680" r="12" fill="#F3FAFF"/>
  <text class="lbl" x="590" y="822" font-size="40">Human Governance</text>

  <path d="M404 415 L592 415" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M808 465 L995 465" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M700 542 L700 605" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 690 L470 690 L470 500" stroke="#D2F1FF" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text class="flow" x="470" y="400">Goal + context</text>
  <text class="flow" x="870" y="500">Action plan</text>
  <text class="flow" x="740" y="578">Approval gate</text>
