<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI system blueprint">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#0E2B49"/></linearGradient><marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#74C8FF"/></marker><style>.t{font:700 33px 'Segoe UI';fill:#EAF4FF}.s{font:500 16px 'Segoe UI';fill:#CEE4FB}.h{font:700 16px 'Segoe UI';fill:#ECF7FF}.b{font:500 13px 'Segoe UI';fill:#D6EAFE}</style></defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<text class="t" x="40" y="56">Agentic AI System Blueprint</text><text class="s" x="40" y="82">Written for: Technology and Finance operations leaders</text>
<rect x="50" y="130" width="270" height="220" rx="16" fill="#12365E" stroke="#67B5F0"/><text class="h" x="70" y="160">Intent + Control</text><text class="b" x="70" y="186">- Goal intake</text><text class="b" x="70" y="208">- Policy/permission gate</text><text class="b" x="70" y="230">- Planner + task graph</text><text class="b" x="70" y="252">- Risk-tier routing</text>
<rect x="360" y="130" width="350" height="220" rx="16" fill="#15473B" stroke="#57D7B4"/><text class="h" x="380" y="160">Execution Layer</text><text class="b" x="380" y="186">- Specialist agents (domain roles)</text><text class="b" x="380" y="208">- Tool/API orchestration</text><text class="b" x="380" y="230">- Shared memory and context sync</text><text class="b" x="380" y="252">- Retry and fallback logic</text>
<rect x="750" y="130" width="470" height="220" rx="16" fill="#5A2538" stroke="#FF90B6"/><text class="h" x="770" y="160">Quality + Governance</text><text class="b" x="770" y="186">- Verifier and constraint checker</text><text class="b" x="770" y="208">- Human escalation for low confidence</text><text class="b" x="770" y="230">- Telemetry, cost, and policy evidence</text><text class="b" x="770" y="252">- Closed-loop improvement</text>
<path d="M320 240 L355 240" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/><path d="M710 240 L745 240" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/>
<rect x="170" y="410" width="940" height="240" rx="16" fill="#0D2746" stroke="#2D649D"/><text class="h" x="200" y="445">Functional Outcomes</text><text class="b" x="200" y="472">Finance: close-cycle assistants, anomaly triage, policy-safe recommendations.</text><text class="b" x="200" y="496">Technology: autonomous incident analysis, release ops, internal support workflows.</text><text class="b" x="200" y="520">Control model: AI executes low-risk actions; humans approve high-impact decisions.</text>
</svg>
