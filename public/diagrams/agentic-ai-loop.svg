<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI reliability loop infographic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A43B6"/><stop offset="100%" stop-color="#0A2E89"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#D2F1FF"/></marker>
    <style>.title{font:700 64px 'Segoe UI';fill:#D9F2FF}.n{font:700 24px 'Segoe UI';fill:#F1FAFF}.s{font:500 16px 'Segoe UI';fill:#CFE7FF}</style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text class="title" x="360" y="92">Agentic Reliability Loop</text>
  <rect x="90" y="130" width="1220" height="620" rx="38" fill="#0B2B89" stroke="#5FB8FF" stroke-width="16" stroke-dasharray="8 12"/>

  <circle cx="320" cy="310" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="265" y="318">Observe</text>
  <circle cx="620" cy="250" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="580" y="258">Plan</text>
  <circle cx="920" cy="310" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="885" y="318">Act</text>
  <circle cx="1080" cy="520" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="1035" y="528">Verify</text>
  <circle cx="780" cy="590" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="720" y="598">Escalate/Commit</text>
  <circle cx="480" cy="540" r="82" fill="#041A62" stroke="#9BE2FF" stroke-width="4"/><text class="n" x="440" y="548">Learn</text>

  <path d="M395 292 L540 262" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M700 262 L840 292" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M965 370 L1035 455" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1000 570 L862 586" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M700 585 L560 556" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M420 500 L340 390" stroke="#D2F1FF" stroke-width="4" marker-end="url(#arrow)"/>

  <text class="s" x="250" y="690">Rule: low confidence, policy conflict, or high-impact action -> escalate to human gate.</text>
  <text class="s" x="250" y="716">Goal: maximize completion speed while keeping operational risk bounded and auditable.</text>
</svg>
