<svg width="1440" height="760" viewBox="0 0 1440 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Financial risk governance flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#09182C"/><stop offset="100%" stop-color="#12355C"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#C9EBFF"/></marker>
    <style>.t{font:700 42px 'Segoe UI';fill:#EAF4FF}.n{font:700 17px 'Segoe UI';fill:#EFF8FF}.s{font:500 14px 'Segoe UI';fill:#CFE6FF}</style>
  </defs>
  <rect width="1440" height="760" fill="url(#bg)"/>
  <text class="t" x="90" y="80">Decision Governance Flow</text>

  <rect x="90" y="140" width="1260" height="520" rx="24" fill="#0F2A4A" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="150" y="250" width="200" height="100" rx="12" fill="#153C64" stroke="#66B2F0"/>
  <text class="n" x="250" y="288" text-anchor="middle">Model Output</text>
  <text class="s" x="250" y="310" text-anchor="middle">Risk signal</text>

  <rect x="390" y="250" width="220" height="100" rx="12" fill="#14505D" stroke="#58C7CF"/>
  <text class="n" x="500" y="288" text-anchor="middle">Policy Thresholds</text>
  <text class="s" x="500" y="310" text-anchor="middle">Confidence and limits</text>

  <rect x="650" y="250" width="220" height="100" rx="12" fill="#58461F" stroke="#EDB472"/>
  <text class="n" x="760" y="288" text-anchor="middle">Decision Split</text>
  <text class="s" x="760" y="310" text-anchor="middle">Within appetite?</text>

  <rect x="910" y="210" width="190" height="90" rx="12" fill="#14505D" stroke="#58C7CF"/>
  <text class="n" x="1005" y="246" text-anchor="middle">Auto Route</text>
  <rect x="910" y="320" width="190" height="90" rx="12" fill="#4D2938" stroke="#FF8FB2"/>
  <text class="n" x="1005" y="356" text-anchor="middle">Human Review</text>

  <rect x="1140" y="250" width="170" height="100" rx="12" fill="#153C64" stroke="#66B2F0"/>
  <text class="n" x="1225" y="288" text-anchor="middle">Audit Trace</text>
  <text class="s" x="1225" y="310" text-anchor="middle">Regulatory evidence</text>

  <path d="M350 300 L385 300" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M610 300 L645 300" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M870 290 L905 255" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M870 310 L905 355" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1100 255 L1135 285" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1100 355 L1135 315" stroke="#C9EBFF" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="250" y="450" width="940" height="150" rx="14" fill="#122F53" stroke="#4A95DA"/>
  <text class="s" x="285" y="490">Controls: immutable logs, override rationale capture, retraining validation cycle.</text>
  <text class="s" x="285" y="518">Operating target: improve risk signal quality without compromising governance.</text>
</svg>
