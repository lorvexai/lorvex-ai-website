<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NHS elective pathway intelligence architecture">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#0F2D4E"/></linearGradient><marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#74C8FF"/></marker><style>.t{font:700 32px 'Segoe UI';fill:#EAF4FF}.s{font:500 16px 'Segoe UI';fill:#CEE4FB}.h{font:700 16px 'Segoe UI';fill:#ECF7FF}.b{font:500 13px 'Segoe UI';fill:#D6EAFE}</style></defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<text class="t" x="40" y="56">NHS Elective Pathway Intelligence</text><text class="s" x="40" y="82">Written for: Healthcare operations and NHS elective recovery teams</text>
<rect x="50" y="130" width="280" height="250" rx="16" fill="#12365E" stroke="#67B5F0"/><text class="h" x="70" y="160">Inputs</text><text class="b" x="70" y="186">- Referrals + waiting lists</text><text class="b" x="70" y="208">- Clinical priority signals</text><text class="b" x="70" y="230">- Capacity by site/session</text><text class="b" x="70" y="252">- DNA/cancellation history</text>
<rect x="370" y="130" width="320" height="250" rx="16" fill="#15473B" stroke="#57D7B4"/><text class="h" x="390" y="160">AI Optimization Layer</text><text class="b" x="390" y="186">- Patient segmentation model</text><text class="b" x="390" y="208">- Priority + fairness scoring</text><text class="b" x="390" y="230">- Slot optimization engine</text><text class="b" x="390" y="252">- No-show prediction</text>
<rect x="730" y="130" width="500" height="250" rx="16" fill="#5A2538" stroke="#FF90B6"/><text class="h" x="750" y="160">Operational Decisions + Governance</text><text class="b" x="750" y="186">- Proposed booking plan and rationale</text><text class="b" x="750" y="208">- Clinical/ops review for high-impact exceptions</text><text class="b" x="750" y="230">- Confirmed actions with audit trace</text><text class="b" x="750" y="252">- Feedback to models by pathway outcomes</text>
<path d="M330 245 L365 245" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/><path d="M690 245 L725 245" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/>
<rect x="170" y="430" width="940" height="220" rx="16" fill="#0D2746" stroke="#2D649D"/><text class="h" x="200" y="465">Functional AI Use in This Article</text><text class="b" x="200" y="492">1) Prioritization AI: urgency-aware ranking and fairness constraints.</text><text class="b" x="200" y="516">2) Scheduling AI: better theatre/clinic slot allocation and utilization.</text><text class="b" x="200" y="540">3) Risk AI: no-show prediction and proactive outreach selection.</text>
</svg>
