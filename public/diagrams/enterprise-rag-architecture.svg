<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Enterprise RAG End-to-End Architecture">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#102B4A"/></linearGradient>
  <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#74C8FF"/></marker>
  <style>
    .t{font:700 34px 'Segoe UI',Arial,sans-serif;fill:#EAF4FF}.s{font:500 16px 'Segoe UI',Arial,sans-serif;fill:#CDE4FB}
    .h{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}.b{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#D6EAFE}
  </style>
</defs>
<rect width="1280" height="760" fill="url(#bg)"/>
<text class="t" x="44" y="56">Enterprise RAG Architecture</text>
<text class="s" x="44" y="82">Written for: Technology, Finance, Healthcare, and NHS architecture teams</text>

<rect x="44" y="120" width="260" height="250" rx="16" fill="#12365E" stroke="#67B5F0"/>
<text class="h" x="62" y="150">Knowledge Supply</text><text class="b" x="62" y="176">- Structured + unstructured data</text><text class="b" x="62" y="198">- Chunking and metadata</text><text class="b" x="62" y="220">- Embeddings + graph links</text><text class="b" x="62" y="242">- Policy tags at ingest</text>

<rect x="354" y="120" width="260" height="250" rx="16" fill="#153F36" stroke="#57D7B4"/>
<text class="h" x="372" y="150">Retrieval Intelligence</text><text class="b" x="372" y="176">- Query rewrite + routing</text><text class="b" x="372" y="198">- Hybrid recall (BM25+dense)</text><text class="b" x="372" y="220">- Reranking and compression</text><text class="b" x="372" y="242">- ACL and policy filtering</text>

<rect x="664" y="120" width="260" height="250" rx="16" fill="#57401B" stroke="#F2BC73"/>
<text class="h" x="682" y="150">Generation Layer</text><text class="b" x="682" y="176">- Prompt assembly</text><text class="b" x="682" y="198">- LLM response generation</text><text class="b" x="682" y="220">- Structured outputs + citations</text><text class="b" x="682" y="242">- Confidence scoring</text>

<rect x="974" y="120" width="260" height="250" rx="16" fill="#5A2538" stroke="#FF90B6"/>
<text class="h" x="992" y="150">Trust and Ops</text><text class="b" x="992" y="176">- Guardrails and red-team checks</text><text class="b" x="992" y="198">- Offline + online evaluation</text><text class="b" x="992" y="220">- Monitoring, cost, drift</text><text class="b" x="992" y="242">- Feedback to orchestration</text>

<path d="M305 245 L350 245" stroke="#74C8FF" stroke-width="3" marker-end="url(#arr)"/>
<path d="M615 245 L660 245" stroke="#74C8FF" stroke-width="3" marker-end="url(#arr)"/>
<path d="M925 245 L970 245" stroke="#74C8FF" stroke-width="3" marker-end="url(#arr)"/>

<rect x="220" y="430" width="840" height="240" rx="18" fill="#0E2745" stroke="#2D649D"/>
<text class="h" x="250" y="464">Cross-Industry Outcomes</text>
<text class="b" x="250" y="494">Finance: faster policy retrieval, audit-ready responses, lower compliance risk.</text>
<text class="b" x="250" y="516">Healthcare: evidence-grounded answers with temporal and safety-aware retrieval.</text>
<text class="b" x="250" y="538">NHS: safer pathway/triage support with explicit escalation and governance logs.</text>
<text class="b" x="250" y="572">Operating model: AI retrieves and drafts; humans approve high-impact actions.</text>
</svg>
